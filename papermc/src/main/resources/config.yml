# ─────────────────────────────────────────────────────────────────
# WildenLink - PaperMC Plugin Configuration
# ─────────────────────────────────────────────────────────────────
# mode:
#   velocity-bridge  →  Receives commands from a Velocity proxy
#                        via plugin messaging. No Discord bot or
#                        database is needed on this server.
#
#   standalone       →  Runs the full linking stack directly on
#                        this Paper server (Discord bot + database).
#                        Use this when there is NO Velocity proxy.
# ─────────────────────────────────────────────────────────────────
mode: velocity-bridge

# ─────────────────────────────────────────────────────────────────
# Standalone Mode Settings  (ignored in velocity-bridge mode)
# ─────────────────────────────────────────────────────────────────
database:
  host: localhost
  port: 3306
  name: wildenlink
  username: wildenlink
  password: wildenlink

discord:
  token: ""
  guild-id: 0
  role-id: 0

standalone:
  # Commands dispatched as console when a player successfully links.
  # %player% is replaced with the player's username.
  link-commands:
    - "lp user %player% parent add member"

  # Commands dispatched as console when a player unlinks.
  unlink-commands:
    - "lp user %player% parent remove member"

