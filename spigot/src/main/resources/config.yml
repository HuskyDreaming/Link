# Link - SpigotMC Plugin Configuration
#
# mode:
#   velocity-bridge  ->  Receives commands from a Velocity proxy via plugin messaging.
#                        No Discord bot or database needed on this server.
#
#   standalone       ->  Runs the full linking stack on this Spigot server (Discord bot + database).
#                        Use this when there is NO Velocity proxy.
mode: velocity-bridge

# Linking behaviour and reward commands (standalone mode only)
# Seconds a player must wait before they can re-link after unlinking. (default: 3600 / 1 hour)
cooldown: 3600

# Commands dispatched as console when a player successfully links.
# %player% is replaced with the player's username.
link-commands:
  - "say %player% has linked their account!"

# Commands dispatched as console when a player unlinks.
unlink-commands:
  - "say %player% has unlinked their account!"

# Log levels for third-party libraries bundled inside the plugin.
# Valid values: INFO, WARN, ERROR, OFF
# WARN (default) hides noisy startup messages while keeping real errors visible.
logging:
  hikari: WARN   # HikariCP connection pool
  jda: WARN      # JDA Discord bot client
