name: Link
version: 1.0.0
api-version: "1.21"
main: com.huskydreaming.link.spigotmc.LinkSpigotPlugin
description: "Link - links Minecraft accounts with Discord. Supports standalone and velocity-bridge modes."
authors:
  - HuskyDreaming

commands:
  link:
    description: Link your Minecraft account with Discord.
    usage: /link
  unlink:
    description: Unlink your Minecraft account from Discord.
    usage: /unlink
